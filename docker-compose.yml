services:
  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    restart: unless-stopped

    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: bookstackapp
      MARIADB_USER: bookstack
      MARIADB_PASSWORD: bookstackpass

    volumes:
      - mariadb_data:/var/lib/mysql

    networks:
      - bookstack_net

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: bookstack
    restart: unless-stopped

    depends_on:
      mariadb:
        condition: service_healthy

    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/New_York

      APP_URL: "http://localhost:8085"
      APP_KEY: "base64:eFiW5967/c+ZUVKTXUxuIwbLum5L9aRqN0Jg8pSSo1g="

      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: bookstackapp
      DB_USERNAME: bookstack
      DB_PASSWORD: bookstackpass

    ports:
      - "8085:80"

    volumes:
      - bookstack_config:/config
      # Mount your GitHub repo images to BookStack's upload directory
      - ./storage/images:/config/www/uploads/images

    networks:
      - bookstack_net

volumes:
  mariadb_data:
  bookstack_config:

networks:
  bookstack_net:
    driver: bridge
